# Local URL: http://localhost:6789 — bare http://fnaf-app:6789/ fails unless /etc/hosts has
# "127.0.0.1 fnaf-app". Or use http://fnaf-app.localhost:6789/ (resolves on macOS without hosts).
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: game-server
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET:-}
      HTTP_ADDR: ${HTTP_ADDR:-:6789}
      DATABASE_PATH: ${DATABASE_PATH:-/data/app.db}
    volumes:
      - sqlite-data:/data
    ports:
      - "6789:6789"
    expose:
      - "6789"
    networks:
      default:
        aliases:
          - fnaf-app

  tunnel:
    container_name: cloudflared-tunnel
    image: cloudflare/cloudflared
    restart: unless-stopped
    command: tunnel run
    depends_on:
      - app
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TOKEN:-}

networks:
  default:
    name: app-network

volumes:
  sqlite-data:
